server.port=8080

# Session cookie for cross-origin (React dev server)
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true

# H2 Database (file-based, persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/purrfect
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (optional, for debugging: http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Stripe (test mode): export STRIPE_API_KEY=sk_test_... or uncomment:
# stripe.api.key=sk_test_your_key_here
app.frontend.url=http://localhost:5173

# Resend (transactional email). Set env RESEND_API_KEY=re_... — optional; if unset, signup still works, no email sent.
# resend.api.key=
# Default "from" works for Resend test domain only. After you verify a domain in Resend, set e.g. Purrfect Market <hello@yourdomain.com>
# resend.from=Purrfect Market <onboarding@resend.dev>
# resend.reply-to=